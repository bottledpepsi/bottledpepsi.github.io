<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon: static fallback to the GitHub avatar (serves the current
       profile picture). js/favicon.js then refreshes it from the live GitHub
       user API so it always tracks the profile picture. -->
  <link rel="icon" id="favicon" type="image/png"
        href="https://avatars.githubusercontent.com/u/139537537?v=4">
  <link rel="apple-touch-icon" id="apple-touch-icon"
        href="https://avatars.githubusercontent.com/u/139537537?v=4">

  <!-- SEO -->
  <title>bottledpepsi</title>
  <meta name="description" content="bottledpepsi is a developer who builds open-source tools and games. Check out their projects on GitHub.">
  <meta name="author" content="bottledpepsi">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://bottledpepsi.github.io/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bottledpepsi.github.io/">
  <meta property="og:title" content="bottledpepsi">
  <meta property="og:description" content="bottledpepsi is a developer who builds open-source tools and games.">
  <meta property="og:site_name" content="bottledpepsi">
  <meta property="og:image" content="https://avatars.githubusercontent.com/u/139537537?v=4">
  <meta property="og:image:width" content="460">
  <meta property="og:image:height" content="460">
  <meta property="og:image:alt" content="bottledpepsi avatar">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@bottledpepsi">
  <meta name="twitter:title" content="bottledpepsi">
  <meta name="twitter:description" content="bottledpepsi is a developer who builds open-source tools and games.">
  <meta name="twitter:image" content="https://avatars.githubusercontent.com/u/139537537?v=4">
  <meta name="twitter:image:alt" content="bottledpepsi avatar">

  <!-- Stylesheets (loaded in order: tokens → base → layout → components → animations → a11y → responsive) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/accessibility.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "bottledpepsi",
    "url": "https://bottledpepsi.github.io/",
    "sameAs": [
      "https://github.com/bottledpepsi",
      "https://x.com/bottledpepsi"
    ],
    "jobTitle": "Developer"
  }
  </script>

  <!--
    Inline theme bootstrap: runs before first paint so the correct theme is
    applied immediately (no flash of the wrong theme). The smooth cross-fade
    animation is handled entirely in CSS by transitions on every colour-changing
    element — this script only sets the attribute, it never disables transitions.
  -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <!-- Skip link for keyboard / assistive-tech users -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Theme toggle -->
  <button
    class="theme-toggle"
    id="theme-toggle"
    type="button"
    aria-label="Switch to light theme"
    title="Toggle colour theme"
  >
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true" focusable="false">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <main class="container" id="main-content">
    <header class="header">
      <h1 class="title">bottledpepsi</h1>
      <p class="subtitle">developer</p>
    </header>

    <section class="section" aria-labelledby="links-heading">
      <h2 class="section-title" id="links-heading">Links</h2>
      <nav aria-label="Social links">
        <div class="links-grid" id="links-grid">
          <!-- Link cards injected by js/projects.js → renderLinks() so the data
               lives in one place. They could equally be static markup. -->
        </div>
      </nav>
    </section>

    <section class="section" aria-labelledby="projects-heading">
      <h2 class="section-title" id="projects-heading">Projects</h2>
      <div
        class="projects-grid"
        id="projects-grid"
        aria-live="polite"
        aria-label="GitHub projects"
      ></div>
    </section>

    <footer class="footer">
      <p><small>&copy; <span id="copyright-year">2026</span> bottledpepsi</small></p>
    </footer>
  </main>

  <!-- Scripts (deferred, modules loaded in dependency order) -->
  <script src="js/config.js" defer></script>
  <script src="js/format.js" defer></script>
  <script src="js/github.js" defer></script>
  <script src="js/projects.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/favicon.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
